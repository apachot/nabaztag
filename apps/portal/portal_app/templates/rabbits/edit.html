{% extends "base.html" %}

{% block title %}Modifier {{ rabbit.name }} | Nabaztag Portal{% endblock %}

{% block content %}
  <section class="panel" style="max-width: 760px; margin: 0 auto;">
    <h1>Modifier {{ rabbit.name }}</h1>
    <form method="post">
      <div class="grid">
        <div class="field">
          <label for="name">Nom</label>
          <input id="name" name="name" required value="{{ rabbit.name }}">
        </div>
        <div class="field">
          <label for="slug">Slug</label>
          <input id="slug" name="slug" required value="{{ rabbit.slug }}">
        </div>
        <div class="field">
          <label for="target_host">Hôte cible</label>
          <input id="target_host" name="target_host" value="{{ rabbit.target_host or '' }}">
        </div>
        <div class="field">
          <label for="target_port">Port cible</label>
          <input id="target_port" name="target_port" type="number" value="{{ rabbit.target_port or 10543 }}">
        </div>
      </div>
      <div class="field">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="5">{{ rabbit.notes or '' }}</textarea>
      </div>
      <div class="actions">
        <button class="button primary" type="submit">Enregistrer</button>
        <a class="pill" href="{{ url_for('main.rabbit_detail', rabbit_id=rabbit.id) }}">Retour</a>
      </div>
    </form>
  </section>
{% endblock %}
