{% extends "base.html" %}

{% block title %}Connexion | Nabaztag Portal{% endblock %}

{% block content %}
  <section class="auth-shell">
    <section class="panel auth-card">
      <p class="section-kicker">Accès portail</p>
      <h1>Connexion</h1>
      <p class="hero-text">Retrouve tes lapins, leurs événements et leurs outils de pilotage.</p>
      <form method="post">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" name="password" type="password" required>
        </div>
        <div class="actions">
          <button class="button primary" type="submit">Entrer</button>
          <a class="pill" href="{{ url_for('auth.register') }}">Créer un compte</a>
        </div>
      </form>
    </section>
  </section>
{% endblock %}
