{% extends "base.html" %}

{% block title %}Créer un compte | Nabaztag Portal{% endblock %}

{% block content %}
  <section class="auth-shell">
    <section class="panel auth-card">
      <p class="section-kicker">Rejoindre le projet</p>
      <h1>Créer un compte</h1>
      <p class="hero-text">Crée ton espace pour rattacher un lapin, suivre ses événements et tester les nouvelles briques du projet.</p>
      <form method="post">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" name="password" type="password" required>
        </div>
        <div class="field">
          <label for="confirm_password">Confirmation</label>
          <input id="confirm_password" name="confirm_password" type="password" required>
        </div>
        <div class="actions">
          <button class="button primary" type="submit">Créer le compte</button>
          <a class="pill" href="{{ url_for('auth.login') }}">J’ai déjà un compte</a>
        </div>
      </form>
    </section>
  </section>
{% endblock %}
